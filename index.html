<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Crashy Chasy | Play Now</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <!-- Open Graph Meta Tags (Fallback for X/Twitter and other social platforms) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://crashy-chasy.vercel.app/">
  <meta property="og:title" content="Crashy Chasy">
  <meta property="og:description" content="Can you survive the chase? Play Crashy Chasy now!">
  <meta property="og:image" content="https://crashy-chasy.vercel.app/asssests/logo.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="628">
  <meta property="og:image:type" content="image/png">

  <!-- Twitter/X Card Metadata (Player Card Structure) -->
  <meta name="twitter:card" content="player">
  <meta name="twitter:site" content="@CrashyChasy">
  <meta name="twitter:title" content="Crashy Chasy">
  <meta name="twitter:description" content="Survive the police chase in this high-octane Web3 game!">
  <meta name="twitter:player" content="https://crashy-chasy.vercel.app/">
  <meta name="twitter:player:width" content="1280">
  <meta name="twitter:player:height" content="1280">
  <meta name="twitter:image" content="https://crashy-chasy.vercel.app/asssests/logo.png">

  <style>
    /* Override/Add styles for the custom look */
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-image: url('asssests/background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #unity-container {
      position: relative !important;
      width: auto !important;
      height: auto !important;
      transform: none !important;
      left: auto !important;
      top: auto !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #unity-canvas {
      /* Cool UI Panel Styling */
      background: #000;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.1);
      width: 100%;
      height: 100%;
      transition: box-shadow 0.3s ease;
    }

    #unity-canvas:hover {
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    #unity-loading-bar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(0, 0, 0, 0.8);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #unity-logo {
        width: 120px;
        height: 120px;
        background: url('asssests/logo.png') no-repeat center;
        background-size: contain;
        margin-bottom: 20px;
    }

    #unity-progress-bar-empty {
        width: 200px;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
    }

    #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #ff00cc, #3333ff);
        box-shadow: 0 0 10px rgba(255, 0, 204, 0.5);
        transition: width 0.2s ease;
    }

    #unity-footer {
      display: none;
    }

    #unity-warning {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        color: white;
        background: rgba(255, 0, 0, 0.8);
        padding: 10px 20px;
        border-radius: 10px;
        display: none;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
  </div>

  <script>
    var canvas = document.querySelector("#unity-canvas");

    function unityShowBanner(msg, type) {
      var warningBanner = document.querySelector("#unity-warning");
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; color: black; padding: 10px;';
        setTimeout(function () {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/CrashyChasy.loader.js";
    var config = {
      arguments: [],
      dataUrl: buildUrl + "/CrashyChasy.data",
      frameworkUrl: buildUrl + "/CrashyChasy.framework.js",
      codeUrl: buildUrl + "/CrashyChasy.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "CrashyChasyTwitter",
      productVersion: "1.0",
      showBanner: unityShowBanner,
    };

    // Dynamic Resizing Function
    function resizeGame() {
      // Base Game Aspect Ratio (Portrait 500:900 = 5:9)
      var gameAspectRatio = 500 / 900;
      var windowWidth = window.innerWidth;
      var windowHeight = window.innerHeight;

      // Calculate available space with some margin
      var availableHeight = windowHeight * 0.90; // Leave 10% margin
      var availableWidth = windowWidth * 0.90;

      var newWidth, newHeight;

      // Try fitting by height first
      newHeight = availableHeight;
      newWidth = newHeight * gameAspectRatio;

      // If width is too big, fit by width
      if (newWidth > availableWidth) {
        newWidth = availableWidth;
        newHeight = newWidth / gameAspectRatio;
      }

      // Apply sizes
      canvas.style.width = newWidth + "px";
      canvas.style.height = newHeight + "px";
    }

    // Initialize resize
    window.addEventListener('resize', resizeGame);
    resizeGame(); // Initial call

    // Mobile handling
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
    }

    document.querySelector("#unity-loading-bar").style.display = "flex";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        document.querySelector("#unity-loading-bar").style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);

  </script>
</body>

</html>
